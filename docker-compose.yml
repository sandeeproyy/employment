version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autoapply}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoapply}
      POSTGRES_DB: ${POSTGRES_DB:-autoapply}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoapply"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (Broker + Cache) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Web Server ──────────────────────────────────────
  web:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - generated_data:/app/generated
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ───────────────────────────────────────────
  worker:
    build: ./backend
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4 -Q discovery,matching,resume,notifications
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - generated_data:/app/generated
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat Scheduler ──────────────────────────────────
  beat:
    build: ./backend
    command: celery -A app.core.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Flower (Task Monitor) ──────────────────────────────────
  flower:
    build: ./backend
    command: celery -A app.core.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
      - worker

  # ── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - web

volumes:
  postgres_data:
  uploads_data:
  generated_data:
